###################################################################
### .github/workflows/terraform-backend.yml
###################################################################

name: Backend Terraform CI/CD with OIDC

# Event that triggers the workflow
on:
  push:
    branches: [ main ]
    # paths:
    # - terraform/**
  pull_request:
    branches: [ main ]
    # paths:
    # - terraform/**

env:
  # verbosity setting for Terraform logs
  TF_LOG: INFO
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
  TF_BACKEND_S3_BUCKET: ${{ vars.TF_BACKEND_S3_BUCKET }}
  TF_VERSION: ${{ vars.TF_VERSION }}
  # WORKING_DIR: './terraform'

permissions:
  id-token: write       # Required for requesting the OIDC JWT
  contents: read        # Required for actions/checkout
  pull-requests: write  # Required for plan comments
  issues: write

# Contains a list of jobs. Each job runs in parallel by default and in an isolated environment.
jobs:
  terraform:
    # needs: security
    name: Terraform Infrastructure State Management
    runs-on: ubuntu-latest
    environment: dev
      # defaults:
      # run:
    # working-directory: ${{ env.WORKING_DIR }}

    # A list of steps that execute in order.
    ## (Optional) Continue only if security checks pass
    steps:
      # Authenticate to AWS via OIDC
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Checkout the repository to the runner
        uses: actions/checkout@v6

      - name: Verify AWS Identity
        run: |
          aws sts get-caller-identity

      - name: Set up Terraform with specified version on the runner
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        id: init
        run: terraform init -backend-config="bucket=$TF_BACKEND_S3_BUCKET"

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -recursive
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        if: github.event_name == 'push'
        run: terraform plan -var-file="environments/dev/dev-terraform.tfvars" -no-color -out=tfplan
        continue-on-error: true

        # Post plan as PR comment
      - name: Post Plan to PR
        uses: actions/github-script@v7
        env:
          PLAN_OUTPUT: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('<!-- terraform-plan-comment -->')
            );

            const initOutcome   = '${{ steps.init.outcome }}';
            const validateOutcome = '${{ steps.validate.outcome }}';
            const planOutcome   = '${{ steps.plan.outcome }}';

            const statusIcon = (outcome) =>
              outcome === 'success' ? '✅' : outcome === 'failure' ? '❌' : '⚠️';

            const planOutput = process.env.PLAN_OUTPUT || '(no output)';
            const truncated  = planOutput.length > 60000
              ? planOutput.slice(0, 60000) + '\n\n... output truncated'
              : planOutput;

            const body = `<!-- terraform-plan-comment -->
            ## Terraform Plan

            | Step | Result |
            |------|--------|
            | Init | ${statusIcon(initOutcome)} \`${initOutcome}\` |
            | Validate | ${statusIcon(validateOutcome)} \`${validateOutcome}\` |
            | Plan | ${statusIcon(planOutcome)} \`${planOutcome}\` |

            <details>
            <summary><strong>Show Plan Output</strong></summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>

            > [!NOTE]
            > Plan generated for commit \`${{ github.event.pull_request.head.sha }}\` — pushed by @${{ github.actor }}.
            `;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

        # Fail if plan failed
      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        id: apply
        # Apply only on push events, not on PRs
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -var-file="environments/dev/dev-terraform.tfvars" -auto-approve tfplan
