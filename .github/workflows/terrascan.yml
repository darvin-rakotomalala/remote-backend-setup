name: Terrascan Security Scan

# Controls when the workflow will run
on:
  push:
    branches: [ "*" ]
    paths-ignore:
      - '**/README.md'
      - 'Documentation/**'
      - 'Verification/**'
    # paths:
    # - terraform/**
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**/README.md'
      - 'Documentation/**'
      - 'Verification/**'
  #schedule:
    # Run a full scan every day at midnight UTC
    #- cron: "0 0 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  id-token: write         # Required for requesting the OIDC JWT
  contents: read          # Required for actions/checkout
  security-events: write  # for github/codeql-action/upload-sarif to upload SARIF results
  actions: read           # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
  pull-requests: write    # Required for plan comments
  issues: write

env:
  # Force all JavaScript actions to run on Node.js 24 to silence Node 20 deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # verbosity setting for Terraform logs
  TF_LOG: INFO
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
  TF_BACKEND_S3_BUCKET: ${{ vars.TF_BACKEND_S3_BUCKET }}
  TF_VERSION: ${{ vars.TF_VERSION }}
  # WORKING_DIR: './terraform'

jobs:
  terrascan:
    name: Terrascan IaC Security Scan
    runs-on: ubuntu-latest
    environment: dev

    steps:
        # ── Checkout source ───────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

        # ── Configure AWS credentials (OIDC) ───────────────────────────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}

        # ── Install Terrascan ─────────────────────────────────────────────────
      - name: Install Terrascan
        run: |
          curl -L "$(curl -s https://api.github.com/repos/tenable/terrascan/releases/latest \
            | grep -o 'https://github.com/tenable/terrascan/releases/download/.*/terrascan_.*_Linux_x86_64.tar.gz')" \
            | tar -xz terrascan
          sudo install terrascan /usr/local/bin/terrascan
          terrascan version

        # ── Run Terrascan and write SARIF to disk ─────────────────────────────
      - name: Run Terrascan
        id: terrascan
        # Exit code 3 means violations found — treat as success so later steps run.
        # Remove "|| true" if you want the workflow to FAIL on violations.
        run: |
          terrascan scan \
            --iac-type terraform \
            --iac-dir . \
            --policy-type all \
            --output sarif \
            --non-recursive=false \
            2>/dev/null > terrascan.sarif || true
          
          # Guard: fail hard only on unexpected errors (exit code not 0 or 3)
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ] && [ $EXIT_CODE -ne 3 ]; then
            echo "Terrascan exited with unexpected code $EXIT_CODE"
            exit $EXIT_CODE
          fi
          
          # Verify the file is non-empty valid JSON before continuing
          if [ ! -s terrascan.sarif ]; then
            echo "ERROR: terrascan.sarif is empty" && exit 1
          fi
          python3 -c "import json,sys; json.load(open('terrascan.sarif'))" \
            && echo "SARIF file is valid JSON" \
            || (echo "ERROR: terrascan.sarif is not valid JSON" && exit 1)

        # ── Upload SARIF to GitHub Security tab ───────────────────────────────
      - name: Upload SARIF report to GitHub Security tab
        if: always() # Upload even when Terrascan finds violations
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: terrascan.sarif
          category: terrascan

        # ── (Optional) Upload raw SARIF as a build artifact ───────────────────
      - name: Archive Terrascan SARIF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terrascan-sarif-report
          path: terrascan.sarif
          retention-days: 7
