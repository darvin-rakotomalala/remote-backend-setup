name: Terrascan Security Scan

# Controls when the workflow will run
on:
  push:
    branches: [ "*" ]
    paths-ignore:
      - '**/README.md'
      - 'Documentation/**'
      - 'Verification/**'
    # paths:
    # - terraform/**
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**/README.md'
      - 'Documentation/**'
      - 'Verification/**'
  schedule:
    # Run a full scan every day at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  id-token: write         # Required for requesting the OIDC JWT
  contents: read          # Required for actions/checkout
  security-events: write  # for github/codeql-action/upload-sarif to upload SARIF results
  actions: read           # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
  pull-requests: write    # Required for plan comments
  issues: write

env:
  # Force all JavaScript actions to run on Node.js 24 to silence Node 20 deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # verbosity setting for Terraform logs
  TF_LOG: INFO
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
  TF_BACKEND_S3_BUCKET: ${{ vars.TF_BACKEND_S3_BUCKET }}
  TF_VERSION: ${{ vars.TF_VERSION }}
  # WORKING_DIR: './terraform'

jobs:
  terrascan:
    name: Terrascan IaC Security Scan
    runs-on: ubuntu-latest
    environment: dev

    steps:
        # ── Checkout source ───────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

        # ── Configure AWS credentials (OIDC) ───────────────────────────────────────────────
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}

        # ── Install Terrascan ─────────────────────────────────────────────────
      #- name: Install Terrascan
        #run: |
            #curl -L https://github.com/tenable/terrascan/releases/latest/download/terrascan_linux_amd64 -o terrascan
            #chmod +x terrascan
            #sudo mv terrascan /usr/local/bin/

        # ── Run Terrascan Command Line ─────────────────────────────────────────────────
      #- name: Run Terrascan Command Line
        #run: terrascan scan -t terraform -d .

        # ── Run Terrascan ─────────────────────────────────────────────────
      - name: Run Terrascan tenable
        id: terrascan
        uses: tenable/terrascan-action@v1.5.0
        with:
          iac_type: terraform           # IaC type: terraform | k8s | helm | kustomize | docker | arm | cloudformation
          iac_version: v15              # Terraform version (for parser hints)
          iac_dir: .                    # Directory containing Terraform files
          policy_type: all              # Policy cloud provider: aws | azure | gcp | github | all
          only_warn: true               # Set to true to never fail the build
          non_recursive: false          # Scan sub-directories recursively
          verbose: true                 # Verbose output
          # Output format for Terrascan results.
          # Options: human | json | yaml | xml | junit-xml | sarif
          # Use "sarif" to integrate with GitHub Code Scanning.
          output_format: "sarif"
          sarif_upload: true            # Upload results as SARIF
          # config_path: .terrascan/config.toml   # Uncomment if using custom config
          # policy_path: .terrascan/policies      # Uncomment for custom OPA policies

        # ── Upload SARIF to GitHub Security tab ───────────────────────────────
      - name: Upload SARIF report to GitHub Security tab
        if: always() # Upload even when Terrascan finds violations
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: terrascan.sarif
          category: terrascan

        # ── 4. (Optional) Upload raw SARIF as a build artifact ───────────────────
      - name: Archive Terrascan SARIF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terrascan-sarif-report
          path: terrascan.sarif
          retention-days: 7
