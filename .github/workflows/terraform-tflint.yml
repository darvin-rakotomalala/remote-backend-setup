name: Terraform Linters (TFLint)

# Controls when the workflow will run
on:
  push:
    branches: [ "*" ]
    paths-ignore:
      - '**/README.md'
      - 'Documentation/**'
      - 'Verification/**'
    # paths:
    # - terraform/**
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**/README.md'
      - 'Documentation/**'
      - 'Verification/**'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  id-token: write         # Required for requesting the OIDC JWT
  contents: read          # Required for actions/checkout
  security-events: write  # for github/codeql-action/upload-sarif to upload SARIF results
  actions: read           # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
  pull-requests: write    # Required for plan comments
  issues: write

env:
  # verbosity setting for Terraform logs
  TF_LOG: INFO
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
  TF_BACKEND_S3_BUCKET: ${{ vars.TF_BACKEND_S3_BUCKET }}
  TF_VERSION: ${{ vars.TF_VERSION }}
  # WORKING_DIR: './terraform'

jobs:
  tflint:
    name: Run TFLint
    runs-on: ubuntu-latest
    environment: dev
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}

      - name: Set up TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Show TFLint version
        run: tflint --version

      - name: Initialize TFLint plugins
        run: tflint --init

      - name: Run TFLint (recursive)
        id: tflint
        run: |
            set +e
            tflint --recursive --format compact 2>&1 | tee tflint-output.txt
            EXIT_CODE=${PIPESTATUS[0]}
            echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
            exit $EXIT_CODE

        # TFLint Exit Codes Reference
        # 0   No issues found
        # 1   Errors found
        # 2   Warnings found (when not using --force)
        # 3   TFLint internal error

      - name: Show TFLint errors summary
        if: failure() && steps.tflint.outputs.exit_code != '0'
        run: |
            echo "## ❌ TFLint found issues" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat tflint-output.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo ""
            echo "---- TFLint errors ----"
            cat tflint-output.txt

      - name: Upload TFLint output
        if: failure() && steps.tflint.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: tflint-results
          path: tflint-output.txt
          retention-days: 7
